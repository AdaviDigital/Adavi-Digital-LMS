name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # This workflow requires the following repository secrets to be configured:
    #   VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PORT (optional, defaults to 22)
    # It assumes the repository is already cloned on the server at ~/adavi-lms with a
    # populated .env file (never committed to git).
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ~/adavi-lms
            git pull origin main
            docker compose pull || true
            docker compose up -d --build
            docker compose exec -T backend npx prisma migrate deploy
            docker image prune -f
